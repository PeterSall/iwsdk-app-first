<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>XR Test</title>
  <style>
    body { font-family: monospace; padding: 20px; }
    pre { background: #f0f0f0; padding: 10px; }
  </style>
</head>
<body>
  <h1>WebXR Test</h1>
  <button onclick="testXR()">Test XR Session</button>
  <pre id="output"></pre>
  
  <script>
    const output = document.getElementById('output');
    
    async function testXR() {
      output.textContent = 'Testing WebXR...\n';
      
      // Check if XR is available
      if (!navigator.xr) {
        output.textContent += '❌ navigator.xr not available\n';
        return;
      }
      
      output.textContent += '✅ navigator.xr available\n';
      
      // Check for immersive-vr support
      try {
        const compat = await navigator.xr.isSessionSupported('immersive-vr');
        output.textContent += `✅ immersive-vr supported: ${compat}\n`;
      } catch (e) {
        output.textContent += `❌ immersive-vr check failed: ${e}\n`;
      }
      
      // Try to request a session
      try {
        output.textContent += 'Requesting XR session...\n';
        const session = await navigator.xr.requestSession('immersive-vr');
        output.textContent += '✅ XR session created!\n';
        await session.end();
      } catch (e) {
        output.textContent += `❌ Session request failed: ${e}\n`;
        output.textContent += `   Code: ${e.code || 'N/A'}\n`;
        output.textContent += `   Name: ${e.name || 'N/A'}\n`;
      }
    }
  </script>
</body>
</html>
